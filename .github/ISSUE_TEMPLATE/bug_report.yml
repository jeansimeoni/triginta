name: Bug report
description: Report behavior that is broken or unexpected.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the smallest steps that reproduce the issue.
      placeholder: |
        1. Run `triginta`
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, terminal, shell, Triginta version or commit, and whether Nerd Font glyphs are enabled.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Add relevant logs or screenshots. Remove secrets before posting.
      render: text
    validations:
      required: false
