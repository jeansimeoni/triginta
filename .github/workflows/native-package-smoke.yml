name: Native Package Smoke

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag or version to validate, for example v0.1.0
        required: true
        type: string

permissions:
  contents: read

jobs:
  prepare-deb:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: ubuntu-22.04
            arch: amd64
            package_pattern: triginta_*_amd64.deb
          - runs_on: ubuntu-22.04-arm
            arch: arm64
            package_pattern: triginta_*_arm64.deb
    runs-on: ${{ matrix.runs_on }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Resolve tag
        shell: bash
        run: |
          tag="${{ inputs.tag }}"
          if [[ "$tag" != v* ]]; then
            tag="v$tag"
          fi
          echo "TAG=$tag" >> "$GITHUB_ENV"

      - name: Download .deb package
        run: |
          mkdir -p smoke-artifacts
          gh release download "$TAG" \
            -R jeansimeoni/triginta \
            --dir smoke-artifacts \
            --pattern "${{ matrix.package_pattern }}"

      - name: Upload .deb smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-deb-${{ matrix.arch }}
          path: smoke-artifacts/

  smoke-deb:
    needs: prepare-deb
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: ubuntu-22.04
            arch: amd64
          - runs_on: ubuntu-22.04-arm
            arch: arm64
    runs-on: ${{ matrix.runs_on }}
    container: debian:bookworm-slim
    steps:
      - name: Install base tools
        run: |
          apt-get update
          apt-get install -y ca-certificates

      - name: Download .deb smoke artifact
        uses: actions/download-artifact@v8
        with:
          name: native-deb-${{ matrix.arch }}
          path: smoke-artifacts

      - name: Install .deb package
        shell: bash
        run: |
          package="$(find smoke-artifacts -type f -name '*.deb' -print -quit)"
          [[ -n "$package" ]]
          dpkg -i "$package"

      - name: Smoke test installed binary
        run: |
          triginta --version
          triginta --help >/dev/null

  prepare-rpm:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: ubuntu-22.04
            arch: x86_64
            package_pattern: triginta-*.x86_64.rpm
          - runs_on: ubuntu-22.04-arm
            arch: aarch64
            package_pattern: triginta-*.aarch64.rpm
    runs-on: ${{ matrix.runs_on }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Resolve tag
        shell: bash
        run: |
          tag="${{ inputs.tag }}"
          if [[ "$tag" != v* ]]; then
            tag="v$tag"
          fi
          echo "TAG=$tag" >> "$GITHUB_ENV"

      - name: Download .rpm package
        run: |
          mkdir -p smoke-artifacts
          gh release download "$TAG" \
            -R jeansimeoni/triginta \
            --dir smoke-artifacts \
            --pattern "${{ matrix.package_pattern }}"

      - name: Upload .rpm smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-rpm-${{ matrix.arch }}
          path: smoke-artifacts/

  smoke-rpm:
    needs: prepare-rpm
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: ubuntu-22.04
            arch: x86_64
          - runs_on: ubuntu-22.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runs_on }}
    container: fedora:40
    steps:
      - name: Install base tools
        run: |
          dnf install -y findutils

      - name: Download .rpm smoke artifact
        uses: actions/download-artifact@v8
        with:
          name: native-rpm-${{ matrix.arch }}
          path: smoke-artifacts

      - name: Install .rpm package
        shell: bash
        run: |
          package="$(find smoke-artifacts -type f -name '*.rpm' -print -quit)"
          [[ -n "$package" ]]
          dnf install -y "$package"

      - name: Smoke test installed binary
        run: |
          triginta --version
          triginta --help >/dev/null
