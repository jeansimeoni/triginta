name: Native Package Smoke

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag or version to validate, for example v0.1.0
        required: true
        type: string

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - id: resolve
        name: Resolve tag
        shell: bash
        run: |
          tag="${{ inputs.tag }}"
          if [[ "$tag" != v* ]]; then
            tag="v$tag"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download x86_64 native packages
        run: |
          mkdir -p smoke-artifacts
          gh release download "${{ steps.resolve.outputs.tag }}" \
            --dir smoke-artifacts \
            --pattern 'triginta_*_amd64.deb' \
            --pattern 'triginta-*.x86_64.rpm'

      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-package-smoke
          path: smoke-artifacts/

  smoke-deb:
    needs: prepare
    runs-on: ubuntu-22.04
    container: debian:bookworm-slim
    steps:
      - name: Install base tools
        run: |
          apt-get update
          apt-get install -y ca-certificates

      - name: Download smoke artifacts
        uses: actions/download-artifact@v4
        with:
          name: native-package-smoke
          path: smoke-artifacts

      - name: Install .deb package
        shell: bash
        run: |
          package="$(find smoke-artifacts -type f -name '*.deb' -print -quit)"
          [[ -n "$package" ]]
          dpkg -i "$package"

      - name: Smoke test installed binary
        run: |
          triginta --version
          triginta --help >/dev/null

  smoke-rpm:
    needs: prepare
    runs-on: ubuntu-22.04
    container: fedora:40
    steps:
      - name: Install base tools
        run: |
          dnf install -y findutils

      - name: Download smoke artifacts
        uses: actions/download-artifact@v4
        with:
          name: native-package-smoke
          path: smoke-artifacts

      - name: Install .rpm package
        shell: bash
        run: |
          package="$(find smoke-artifacts -type f -name '*.rpm' -print -quit)"
          [[ -n "$package" ]]
          dnf install -y "$package"

      - name: Smoke test installed binary
        run: |
          triginta --version
          triginta --help >/dev/null
