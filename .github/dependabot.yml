version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    # Disable routine version-bump PRs for Rust dependencies.
    # Handle Cargo upgrades deliberately during maintenance passes or
    # through Dependabot security updates enabled at the repository level.
    open-pull-requests-limit: 0

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      github-actions:
        patterns:
          - "*"
    open-pull-requests-limit: 1
